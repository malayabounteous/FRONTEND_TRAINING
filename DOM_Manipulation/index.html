<script>
    function changeTitle()
    {
     document.getElementById("title").textContent="Hello bacho";
    }
    function changeStyle()
    {
        document.getElementById("title").classList.add("style1");
    }
    function addList()
    {
        const ll=document.createElement("li");
        
        ll.textContent="new item";
        document.getElementById("list").appendChild(ll);
    }
    
    function deleteItem(button)
    {
      button.parentElement.remove();
    }
    function showName()
    {
        const name=document.getElementById("nameid").value;
        const st= document.getElementById("output").textContent;
        document.getElementById("output").textContent=st+" Hello "+name;
    }
    

    function addTask()
    {
        const task=document.getElementById("todo").value;

        const li=document.createElement("li");
        li.textContent=task;

        const btn=document.createElement("button");
        btn.textContent="delete task";
        btn.onclick=function(){
            li.remove();
        }
        li.appendChild(btn);
        document.getElementById("task").appendChild(li);
    }
    
    function addHtml()
    {
        const name=document.getElementById("todo").value;

        const ul=document.getElementById("task");
        ul.innerHTML+=`
        <li>
            ${name}

            <button onClick="this.parentElement.remove()">DELETE</button>

            </li>
        `
    }






</script>
